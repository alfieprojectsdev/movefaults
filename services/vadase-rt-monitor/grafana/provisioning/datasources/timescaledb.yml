apiVersion: 1

datasources:
  - name: TimescaleDB
    uid: timescaledb-main
    type: postgres
    url: db:5432
    database: pogf_db
    user: pogf_user
    secureJsonData:
      # Same env var that docker-compose feeds Postgres (POGF_DB_PASSWORD) —
      # rotating the password in .env updates both sides; no stale literal here.
      password: $__env{POGF_DB_PASSWORD}
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1500
      timescaledb: true
    isDefault: true
